        - heading "Research Summary" [level=3] [ref=e577]
        - paragraph [ref=e579]: Peter O'Toole is the Group CEO of Cellulant, a leading Pan-African payments company, having been appointed in June 2023 after serving as Acting CEO and CFO. Under his leadership, Cellulant has been actively expanding its operations, recently acquiring a Payment Service Provider (PSP) license in Ghana to enhance its digital payment solutions for businesses. The company aims to deepen its presence in key markets, exemplified by the appointment of Freddie Oduro as Country Manager for Ghana, focusing on enterprise payments growth. Cellulant is committed to providing secure and innovative payment solutions across various sectors, including e-commerce and utilities. With over 30 years of experience in finance and payments, O'Toole's expertise positions him as a thought leader in the industry, making him a valuable contact for discussions on digital payment innovations and market expansion strategies in Africa.
