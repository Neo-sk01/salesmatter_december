                              - generic:
                                - paragraph: Body
                                - paragraph: Hi Peter, I saw Cellulant's Ghana PSP licence and Freddie Oduro's appointment to grow enterprise payments there. That feels like a point where media accountability needs to match market ambition. We work with Pan-African growth teams managing paid media across fragmented channels. The difficult part is knowing which markets and channels deserve the next rand while campaigns are live. Perion's Outmax, brought into African markets through Mediamark and McSorely Media, helps optimise pacing and spend allocation in real time against brand defined outcomes. Perion positions Outmax around up to 40 percent efficiency, in a market forecast to reach 6.5 billion dollars by 2029 at 15.3 percent CAGR. Would it be worth comparing this against Cellulant's media priorities? Best regards, Carl Davis Founder, SalesMatter carl@salesmatter.co.za +27 74 172 5891
