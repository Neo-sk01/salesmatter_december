                              - generic:
                                - paragraph: Body
                                - paragraph: Hi Sean, I noticed Rainfin's majority stake sale to LeBashe and the planned R1 billion SME fund. With Texmex piloting R40 million, it feels like growth media needs the same accountability as the credit marketplace. We work with African financial services and fintech teams spending across YouTube, Meta, TikTok, programmatic, display and video. The difficult part is that acquisition spend sits across too many platforms, and it is not always clear where the next rand should go while campaigns are live. Perion's Outmax, brought into African markets through Mediamark and McSorely Media, helps optimise pacing and spend allocation in real time against brand defined business outcomes, not only platform KPIs. Perion positions Outmax around up to 40 percent efficiency. Wepner delivered 96 percent YouTube completion and a 27 percent reduction in carbon intensity. Could it be worth looking at this in the context of Rainfin's next growth campaign? Best regards, Dewald Van Niekerk Head of Sales dewald.vanniekerk@mediamark.co.za
